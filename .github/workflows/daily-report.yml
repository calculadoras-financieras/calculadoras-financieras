name: 📊 Informe Diario de Rendimiento

on:
  schedule:
    # 7:00 UTC = 8:00 Madrid (invierno) / 9:00 Madrid (verano, ajustar a 6:00 UTC)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Enviar informe manualmente'
        required: false
        default: 'Test manual del informe'

jobs:
  daily-report:
    name: Generar y enviar informe diario
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar informe GA4 y enviar por Telegram
        env:
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          GA4_PROPERTY_ID:           ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY:   ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
        run: node scripts/daily-report.js

      - name: Notificar fallo del informe
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node -e "
            const { sendAlert } = require('./scripts/notify-telegram.js');
            sendAlert('Error generando informe diario',
              'El workflow del informe diario ha fallado. Revisar logs en GitHub Actions.')
              .then(() => console.log('Alerta de fallo enviada'))
              .catch(console.error);
          "
