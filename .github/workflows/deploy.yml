name: 🚀 Deploy a Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 'Qué desplegar'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - hub
          - simular-hipoteca
          - calculadora-irpf
          - calculadora-finiquito
          - calculadora-pension
          - calculadora-inversion
          - calculadora-ahorro
          - calculadora-prestamo
          - calculadora-salario

jobs:
  deploy:
    name: Deploy todos los sites
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Hub (calculadoras-financieras.es) ────────────────────────────────
      - name: Deploy Hub
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'hub' || github.event_name == 'push' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy . --project-name=calculadoras-financieras --branch=main --commit-dirty=true

      # ── Simular Hipoteca (simular-hipoteca.es) ───────────────────────────
      - name: Deploy Simular Hipoteca
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'simular-hipoteca' || github.event_name == 'push' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/simular-hipoteca --project-name=simular-hipoteca --branch=main --commit-dirty=true

      # ── Calculadora IRPF (calculadora-irpf.es) ───────────────────────────
      - name: Deploy Calculadora IRPF
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'calculadora-irpf' || github.event_name == 'push' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/calculadora-irpf --project-name=calculadora-irpf --branch=main --commit-dirty=true

      # ── Calculadora Finiquito (calculadora-finiquito.es) ─────────────────
      - name: Deploy Calculadora Finiquito
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'calculadora-finiquito' || github.event_name == 'push' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/calculadora-finiquito --project-name=calculadora-finiquito --branch=main --commit-dirty=true

      # ── Calculadora Pensión (calculadora-pension.es) ─────────────────────
      - name: Deploy Calculadora Pensión
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'calculadora-pension' || github.event_name == 'push' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/calculadora-pension --project-name=calculadora-pension --branch=main --commit-dirty=true

      # ── Calculadora Inversión (calculadora-inversion.es) ─────────────────
      - name: Deploy Calculadora Inversión
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'calculadora-inversion' || github.event_name == 'push' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/calculadora-inversion --project-name=calculadora-inversion --branch=main --commit-dirty=true

      # ── Calculadora Ahorro (calculadora-ahorro.es) ───────────────────────
      - name: Deploy Calculadora Ahorro
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'calculadora-ahorro' || github.event_name == 'push' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/calculadora-ahorro --project-name=calculadora-ahorro --branch=main --commit-dirty=true

      # ── Calculadora Préstamo (calculadora-prestamo.es) ───────────────────
      - name: Deploy Calculadora Préstamo
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'calculadora-prestamo' || github.event_name == 'push' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/calculadora-prestamo --project-name=calculadora-prestamo --branch=main --commit-dirty=true

      # ── Calculadora Salario (calculadora-salario.com) ────────────────────
      - name: Deploy Calculadora Salario
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'calculadora-salario' || github.event_name == 'push' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/calculadora-salario --project-name=calculadora-salario --branch=main --commit-dirty=true

      # ── Notificar éxito ──────────────────────────────────────────────────
      - name: Notificar deploy completado
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_SHA=$(git log -1 --pretty=format:"%h")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "text=✅ <b>Deploy completado</b>%0A📦 <code>${COMMIT_SHA}</code> ${COMMIT_MSG}%0A🌐 9/9 sites desplegados en producción" || true

      # ── Notificar fallo ──────────────────────────────────────────────────
      - name: Notificar fallo de deploy
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "text=🚨 <b>Deploy FALLIDO</b>%0ARevisar logs en GitHub Actions: https://github.com/calculadoras-financieras/calculadoras-financieras/actions" || true
