name: Monitor de Micrositios

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    name: Verificar todos los micrositios
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restaurar estado
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/monitor-state.json
          key: monitor-state-${{ github.run_id }}
          restore-keys: |
            monitor-state-

      - name: Ejecutar monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/monitor.js

      - name: Guardar estado
        if: always()
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/monitor-state.json
          key: monitor-state-${{ github.run_id }}

      - name: Notificar fallo del workflow
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=⚠️ El workflow de monitor ha fallado. Ver logs en GitHub Actions." \
            -d "parse_mode=HTML" || true
