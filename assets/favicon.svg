<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0F2A4A"/>
      <stop offset="100%" stop-color="#1a4070"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00B894"/>
      <stop offset="100%" stop-color="#00CEC9"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="6" fill="url(#g1)"/>
  <!-- Pantalla de calculadora -->
  <rect x="4" y="4" width="24" height="9" rx="2" fill="url(#g2)" opacity="0.9"/>
  <!-- Símbolo € en pantalla -->
  <text x="16" y="11.5" text-anchor="middle" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#ffffff">€</text>
  <!-- Botones -->
  <rect x="4"  y="16" width="6" height="4" rx="1" fill="#ffffff" opacity="0.2"/>
  <rect x="13" y="16" width="6" height="4" rx="1" fill="#ffffff" opacity="0.2"/>
  <rect x="22" y="16" width="6" height="4" rx="1" fill="url(#g2)" opacity="0.8"/>
  <rect x="4"  y="23" width="6" height="4" rx="1" fill="#ffffff" opacity="0.2"/>
  <rect x="13" y="23" width="6" height="4" rx="1" fill="#ffffff" opacity="0.2"/>
  <rect x="22" y="23" width="6" height="4" rx="1" fill="url(#g2)" opacity="0.8"/>
  <!-- Barra acento inferior -->
  <rect x="4" y="29" width="24" height="2" rx="1" fill="url(#g2)"/>
</svg>
