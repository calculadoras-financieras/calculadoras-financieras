      "@type": "Question",
      "name": "¿Cómo se calcula la cuota de una hipoteca?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "La cuota mensual se calcula con la fórmula de amortización francesa: C = K × [r(1+r)^n] / [(1+r)^n - 1], donde K es el capital, r es el tipo de interés mensual y n el número de cuotas. Con un capital de 200.000€ al 3% a 30 años, la cuota es aproximadamente 843€/mes."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué es el euríbor y cómo afecta a mi hipoteca?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "El euríbor (Euro Interbank Offered Rate) es el tipo de interés al que los bancos europeos se prestan dinero entre sí. Las hipotecas variables se referencian al euríbor + un diferencial (ej: euríbor + 0,75%). Cuando sube el euríbor, sube tu cuota mensual."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cuánto debería pagar como máximo de hipoteca al mes?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Los expertos recomiendan que la cuota hipotecaria no supere el 30-35% de los ingresos netos mensuales del hogar. Con un salario neto de 2.000€/mes, la cuota máxima recomendada sería de 600-700€/mes."
      }
    }
  ]
}
</script>
